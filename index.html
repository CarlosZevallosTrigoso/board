<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #fff; 
            color: #000; 
            font: 16px/1.5 'Roboto Mono', monospace; 
            margin: 0; 
            padding: 0 20px 20px; 
        }
        .container { max-width: 800px; }
        h1 { 
            font-size: 1em; 
            font-weight: normal; 
            margin: 0;
            padding: 10vh 0 1.5em;
            position: sticky; 
            top: 0; 
            background: #fff; 
            z-index: 1; 
        }
        .message { 
            margin-bottom: 1em; 
            transition: opacity 0.3s;
            cursor: pointer;
        }
        .message.faded { opacity: 0.15; }
        .message.faded:hover { opacity: 1; }
        .timestamp { display: block; margin-bottom: 0.3em; color: #a11d1d; font-size: 0.9em; }
        .error { color: #ff4141; }
        a { color: inherit; }
        sup.fn {
            cursor: pointer;
            font-size: 0.7em;
            vertical-align: super;
            text-decoration: underline;
            text-decoration-style: dotted;
        }
        .footnotes {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, margin 0.3s ease;
            font-size: 0.85em;
            opacity: 0.6;
            margin: 0;
        }
        .footnotes.open {
            max-height: 500px;
            margin-top: 0.5em;
        }
        .footnotes span { display: block; }
        @media (min-width: 768px) { body { padding-left: 20vw; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Notas</h1>
        <div id="messages">Cargando...</div>
    </div>
    <script>
        function dateToId(str) {
            return str.replace(/:/g, '-');
        }

        function formatDate(str) {
            try {
                const d = new Date(str);
                if (isNaN(d)) return '[Fecha inválida]';
                const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
                const pad = n => String(n).padStart(2, '0');
                let h = d.getHours();
                const ampm = h >= 12 ? 'p.m.' : 'a.m.';
                h = h > 12 ? h - 12 : (h === 0 ? 12 : h);
                return `[${dias[d.getDay()]} ${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(h)}:${pad(d.getMinutes())}:${pad(d.getSeconds())} ${ampm}]`;
            } catch { return '[Fecha inválida]'; }
        }

        function formatDateChicago(str) {
            try {
                const d = new Date(str);
                if (isNaN(d)) return str;
                const pad = n => String(n).padStart(2, '0');
                let h = d.getHours();
                const ampm = h >= 12 ? 'p.m.' : 'a.m.';
                h = h > 12 ? h - 12 : (h === 0 ? 12 : h);
                return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}, ${pad(h)}:${pad(d.getMinutes())} ${ampm}`;
            } catch { return str; }
        }

        function formatText(text, msgId) {
            let s = text.replace(/</g, '&lt;');
            let fnCount = 0;
            const footnotes = [];
            s = s.replace(/\{([^}]+)\}/g, (_, content) => {
                fnCount++;
                footnotes.push(content);
                return `<sup class="fn" data-msg="${msgId}">${fnCount}</sup>`;
            });
            s = s.replace(/\*([^*]+)\*/g, '<b>$1</b>');
            s = s.replace(/_([^_]+)_/g, '<u>$1</u>');
            s = s.replace(/~([^~]+)~/g, '<s>$1</s>');
            s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
            s = s.replace(/(https?:\/\/[^\s<]+)(?![^<]*<\/a>)/g, (url) => {
                const label = url.replace(/^https?:\/\//, '').replace(/\/$/, '');
                return `<a href="${url}" target="_blank" rel="noopener">${label}</a>`;
            });
            if (footnotes.length) {
                s += `<div class="footnotes" id="fn-${msgId}">` +
                    footnotes.map((f, i) => `<span>${i + 1}. ${f}</span>`).join('') +
                    '</div>';
            }
            return s;
        }

        async function load() {
            const el = document.getElementById('messages');
            try {
                const res = await fetch('./messages.json');
                if (!res.ok) throw new Error(res.status);
                const messages = await res.json();
                if (!messages.length) { el.textContent = 'No hay entradas.'; return; }

                const hash = window.location.hash ? window.location.hash.slice(1) : null;

                el.innerHTML = messages.map((m, i) => {
                    const id = dateToId(m.date);
                    const lit = hash ? id === hash : i === 0;
                    return `<div class="message${lit ? '' : ' faded'}" id="${id}" data-date="${m.date}"><span class="timestamp">${formatDate(m.date)}</span><div class="text">${formatText(m.text, i)}</div></div>`;
                }).join('');

                // click to toggle any message
                el.addEventListener('click', (e) => {
                    const msg = e.target.closest('.message');
                    if (!msg) return;
                    if (e.target.closest('a, .fn')) return;
                    msg.classList.toggle('faded');
                });

                // footnote hover
                el.addEventListener('mouseenter', (e) => {
                    if (!e.target.classList.contains('fn')) return;
                    const block = document.getElementById('fn-' + e.target.dataset.msg);
                    if (block) block.classList.add('open');
                }, true);
                el.addEventListener('mouseleave', (e) => {
                    if (!e.target.classList.contains('fn')) return;
                    const block = document.getElementById('fn-' + e.target.dataset.msg);
                    if (block) block.classList.remove('open');
                }, true);

                // chicago citation on copy
                document.addEventListener('copy', (e) => {
                    const selection = window.getSelection();
                    if (!selection.rangeCount) return;
                    const range = selection.getRangeAt(0);
                    const msg = range.startContainer.closest ? 
                        range.startContainer.closest('.message') : 
                        range.startContainer.parentElement?.closest('.message');
                    if (!msg) return;
                    const date = msg.dataset.date;
                    const baseUrl = window.location.origin + window.location.pathname;
                    const url = baseUrl + '#' + dateToId(date);
                    const cited = formatDateChicago(date);
                    const text = selection.toString();
                    const citation = `\n\nCarlos Zevallos Trigoso, "${cited}," Notas, ${url}.`;
                    e.preventDefault();
                    e.clipboardData.setData('text/plain', text + citation);
                });

                // scroll to anchor on load
                if (hash) {
                    const target = document.getElementById(hash);
                    if (target) target.scrollIntoView({ behavior: 'smooth' });
                }

            } catch (e) {
                el.innerHTML = '<span class="error">Error al cargar.</span>';
            }
        }

        load();
    </script>
</body>
</html>
